<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 神经心理康复中心</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>修改密码</h1>
            <div class="user-info">
                <span>欢迎，{{ session.user.real_name }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-secondary btn-small">退出</a>
            </div>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="section">
            <h2>修改密码</h2>
            <form method="POST" action="{{ url_for('change_password') }}">
                <div class="form-group">
                    <label>当前密码</label>
                    <input type="password" name="current_password" required placeholder="请输入当前密码">
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="new_password" required placeholder="请输入新密码">
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" name="confirm_password" required placeholder="请再次输入新密码">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-success">修改密码</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">返回</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
